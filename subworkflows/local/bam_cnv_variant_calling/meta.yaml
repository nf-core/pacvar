name: "bam_cnv_variant_calling"
description: Copy number variation calling from BAM files using HiFiCNV
keywords:
  - cnv
  - copy number variation
  - pacbio
  - hifi
  - long-read
  - variant calling
components:
  - hificnv
  - bcftools/index
input:
  - bam_bai_maf:
      type: channel
      description: |
        Channel containing BAM files with their indices and optional MAF files
        Structure: tuple val(meta), path(bam), path(bai), path(maf)
  - fasta:
      type: channel
      description: |
        Channel containing reference genome FASTA file
        Structure: tuple val(meta2), path(ref)
  - exclude:
      type: channel
      description: |
        Channel containing optional exclude regions BED file
        Structure: tuple val(meta3), path(exclude)
  - expected_cn:
      type: channel
      description: |
        Channel containing optional expected copy number file
        Structure: tuple val(meta4), path(expected_cn)
output:
  - copynum:
      type: channel
      description: |
        Channel containing copy number segments in bedGraph format
        Structure: tuple val(meta), path("*.copynum.bedgraph")
  - depth:
      type: channel
      description: |
        Channel containing depth coverage in BigWig format
        Structure: tuple val(meta), path("*.depth.bw")
  - maf:
      type: channel
      description: |
        Channel containing minor allele frequency in BigWig format (optional)
        Structure: tuple val(meta), path("*.maf.bw")
  - vcf:
      type: channel
      description: |
        Channel containing CNV calls in VCF format (optional)
        Structure: tuple val(meta), path("*.vcf.gz")
  - vcf_indexed:
      type: channel
      description: |
        Channel containing indexed CNV VCF files
        Structure: tuple val(meta), path("*.vcf.gz"), path("*.vcf.gz.csi")
  - versions:
      type: channel
      description: |
        Channel containing software versions
        Structure: path(versions.yml)
authors:
  - "@chaochaowong"